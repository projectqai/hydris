plugins {
  id 'com.android.library'
  id 'org.jetbrains.kotlin.android'
  id 'expo-module-gradle-plugin'
}

def aarFile = file('libs/hydris.aar')
def jniLibsDir = file('src/main/jniLibs')

if (aarFile.exists()) {
  delete jniLibsDir
  def extractDir = file("${buildDir}/aar-extract")
  extractDir.mkdirs()
  copy {
    from zipTree(aarFile)
    into extractDir
  }
  copy {
    from "${extractDir}/jni"
    into jniLibsDir
  }
}

android {
  namespace "expo.modules.hydrisengine"
  defaultConfig {
    versionCode 1
    versionName '1.0.0'
    consumerProguardFiles 'proguard-rules.pro'
  }
}

dependencies {
  api files('libs/classes.jar')
  api files('libs/go-classes.jar')
  api files('libs/hal-classes.jar')
  implementation 'com.github.mik3y:usb-serial-for-android:3.10.0'
}
