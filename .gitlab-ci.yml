stages:
  - build

variables:
  GO_VERSION: "1.25.8"
  PROTOC_VERSION: "28.3"

.go-setup: &go-setup
  - wget -q https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz
  - sudo rm -rf /usr/local/go && sudo tar -C /usr/local -xzf go${GO_VERSION}.linux-amd64.tar.gz
  - export PATH=$PATH:/usr/local/go/bin:$HOME/go/bin

.protoc-setup: &protoc-setup
  - wget -q https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip
  - sudo unzip -o protoc-${PROTOC_VERSION}-linux-x86_64.zip -d /usr/local
  - sudo chmod +x /usr/local/bin/protoc

.go-tools-setup: &go-tools-setup
  - go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
  - go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
  - go install connectrpc.com/connect/cmd/protoc-gen-connect-go@latest
  - go install github.com/pseudomuto/protoc-gen-doc/cmd/protoc-gen-doc@latest
  - go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@latest

.node-setup: &node-setup
  - wget -q https://nodejs.org/dist/v20.18.0/node-v20.18.0-linux-x64.tar.gz
  - sudo tar -xzf node-v20.18.0-linux-x64.tar.gz -C /usr/local --strip-components=1

.bun-setup: &bun-setup
  - curl -fsSL https://bun.sh/install | bash
  - export PATH=$PATH:$HOME/.bun/bin

vet:
  stage: build
  image: ubuntu:22.04
  before_script:
    - apt-get update && apt-get install -y wget unzip curl sudo git make
    - *go-setup
    - *protoc-setup
    - *go-tools-setup
    - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
    - go install golang.org/x/vuln/cmd/govulncheck@latest
  script:
    - make vet
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_MERGE_REQUEST_ID

build:
  stage: build
  image: ubuntu:22.04
  before_script:
    - apt-get update && apt-get install -y wget unzip curl sudo git rsync make libgtk-3-dev libwebkit2gtk-4.1-dev mingw-w64 zip
    - *node-setup
    - *go-setup
    - *protoc-setup
    - *go-tools-setup
    - *bun-setup
  script:
    - (cd view/frontend && bun i)
    - make frontend
    - |
      if [[ -n "$CI_COMMIT_TAG" ]]; then
        TAG_NAME=$CI_COMMIT_TAG
      else
        TAG_NAME=${CI_COMMIT_SHORT_SHA}
      fi
    - make cli
    - make desktop
    - |
      for f in bin/hydris-*; do
        curl --header "JOB-TOKEN: $CI_JOB_TOKEN" \
          --upload-file "$f" \
          "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/hydris/$TAG_NAME/$(basename $f)"
      done
  artifacts:
    paths:
      - bin/
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG


docker:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  needs:
    - job: build
      artifacts: true
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
    DOCKER_DRIVER: overlay2
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker buildx create --use --name multiarch --driver docker-container --driver-opt network=host
  script:
    - |
      cp bin/hydris-cli-linux-amd64-* bin/hydris-amd64
      cp bin/hydris-cli-linux-arm64-* bin/hydris-arm64
      chmod +x bin/hydris-amd64 bin/hydris-arm64
    - |
      if [[ -n "$CI_COMMIT_TAG" ]]; then
        docker buildx build --platform linux/amd64,linux/arm64 \
          -t $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG \
          -t $CI_REGISTRY_IMAGE:latest \
          --push .
      else
        docker buildx build --platform linux/amd64,linux/arm64 \
          -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA \
          -t $CI_REGISTRY_IMAGE:$CI_COMMIT_BRANCH \
          --push .
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

release:
  stage: build
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build
      artifacts: true
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Release $CI_COMMIT_TAG"
    description: |
      Release $CI_COMMIT_TAG

      ## Downloads
      - CLI Linux AMD64: hydris-cli-linux-amd64-${CI_COMMIT_TAG}.tar.xz
      - CLI Linux ARM64: hydris-cli-linux-arm64-${CI_COMMIT_TAG}.tar.xz
      - CLI Windows AMD64: hydris-cli-windows-amd64-${CI_COMMIT_TAG}.zip
      - CLI macOS ARM64: hydris-cli-macos-arm64-${CI_COMMIT_TAG}.tar.xz
      - Desktop Windows: hydris-desktop-windows-amd64-${CI_COMMIT_TAG}.zip
      - Desktop macOS ARM64: hydris-desktop-macos-arm64-${CI_COMMIT_TAG}.zip
    assets:
      links:
        - name: "CLI Linux AMD64"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/hydris/${CI_COMMIT_TAG}/hydris-cli-linux-amd64-${CI_COMMIT_TAG}.tar.xz"
        - name: "CLI Linux ARM64"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/hydris/${CI_COMMIT_TAG}/hydris-cli-linux-arm64-${CI_COMMIT_TAG}.tar.xz"
        - name: "CLI Windows AMD64"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/hydris/${CI_COMMIT_TAG}/hydris-cli-windows-amd64-${CI_COMMIT_TAG}.zip"
        - name: "CLI macOS ARM64"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/hydris/${CI_COMMIT_TAG}/hydris-cli-macos-arm64-${CI_COMMIT_TAG}.tar.xz"
        - name: "Desktop Windows"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/hydris/${CI_COMMIT_TAG}/hydris-desktop-windows-amd64-${CI_COMMIT_TAG}.zip"
        - name: "Desktop macOS ARM64"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/hydris/${CI_COMMIT_TAG}/hydris-desktop-macos-arm64-${CI_COMMIT_TAG}.zip"
  rules:
    - if: $CI_COMMIT_TAG
