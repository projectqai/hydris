name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - '*'

env:
  GO_VERSION: '1.26.2'
  PROTOC_VERSION: '28.3'


jobs:
  deeptest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run deep tests
        run: make deeptest

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun modules
        uses: actions/cache@v5
        with:
          path: view/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('view/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install system dependencies
        run: |
          which make && which wget && which unzip || (sudo apt-get update && sudo apt-get install -y wget unzip build-essential)

      - name: Install protoc
        run: |
          which protoc || (wget -q https://github.com/protocolbuffers/protobuf/releases/download/v${{ env.PROTOC_VERSION }}/protoc-${{ env.PROTOC_VERSION }}-linux-x86_64.zip \
            && sudo unzip -q protoc-${{ env.PROTOC_VERSION }}-linux-x86_64.zip -d /usr/local \
            && sudo chmod +x /usr/local/bin/protoc)

      - name: Install Go tools
        run: make install-tools

      - name: Build frontend
        run: make frontend

      - name: Build CLI binaries
        run: make cli

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: hydris-binaries
          path: bin/
          retention-days: 7

  desktop:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install system dependencies
        run: |
          which make && which x86_64-w64-mingw32-gcc || (sudo apt-get update && sudo apt-get install -y build-essential libgtk-3-dev libwebkit2gtk-4.1-dev libssl-dev mingw-w64)

      - name: Install rcodesign
        run: which rcodesign || cargo install apple-codesign

      - name: Build frontend
        run: make frontend

      - name: Build desktop
        run: make desktop

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: hydris-desktop
          path: bin/
          retention-days: 7

  android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ANDROID_SDK_ROOT: /opt/android-sdk
      ANDROID_HOME: /opt/android-sdk
      GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        if: ${{ !env.JAVA_HOME }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun modules
        uses: actions/cache@v5
        with:
          path: view/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('view/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install system dependencies
        run: |
          which make && which wget && which rsync || (sudo apt-get update && sudo apt-get install -y wget unzip rsync build-essential)

      - name: Install protoc
        run: |
          which protoc || (wget -q https://github.com/protocolbuffers/protobuf/releases/download/v${{ env.PROTOC_VERSION }}/protoc-${{ env.PROTOC_VERSION }}-linux-x86_64.zip \
            && sudo unzip -q protoc-${{ env.PROTOC_VERSION }}-linux-x86_64.zip -d /usr/local \
            && sudo chmod +x /usr/local/bin/protoc)

      - name: Install Go tools
        run: make install-tools

      - name: Install Android SDK
        run: |
          if which sdkmanager >/dev/null 2>&1; then
            echo "Android SDK already installed"
          else
            mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
            unzip -q cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
            mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          fi
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

      - name: Accept Android SDK licenses and install components
        run: |
          if [ ! -d "$ANDROID_SDK_ROOT/ndk/26.1.10909125" ]; then
            yes | sdkmanager --licenses || true
            sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;26.1.10909125"
          fi
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Build frontend
        run: make frontend

      - name: Build Android APK
        run: make android

      - name: Upload Android artifact
        uses: actions/upload-artifact@v7
        with:
          name: hydris-android-apk
          path: view/apps/foss/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

  docker:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: hydris-*
          merge-multiple: true

      - name: Prepare binaries
        run: |
          mkdir -p bin
          tar -xJf hydris-cli-linux-amd64-*.tar.xz -C bin
          mv bin/hydris-cli-linux-amd64-* bin/hydris-amd64
          tar -xJf hydris-cli-linux-arm64-*.tar.xz -C bin
          mv bin/hydris-cli-linux-arm64-* bin/hydris-arm64
          chmod +x bin/hydris-amd64 bin/hydris-arm64
          ls -la bin/hydris-*

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: [build, desktop, android, docker]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: hydris-*
          path: bin
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            Release ${{ github.ref_name }}

            ## Downloads
            - CLI Linux AMD64: hydris-cli-linux-amd64-${{ github.ref_name }}.tar.xz
            - CLI Linux ARM64: hydris-cli-linux-arm64-${{ github.ref_name }}.tar.xz
            - CLI Windows AMD64: hydris-cli-windows-amd64-${{ github.ref_name }}.zip
            - CLI macOS ARM64: hydris-cli-macos-arm64-${{ github.ref_name }}.tar.xz
            - Desktop Windows: hydris-desktop-windows-amd64-${{ github.ref_name }}.zip
            - Desktop macOS ARM64: hydris-desktop-macos-arm64-${{ github.ref_name }}.zip
            - Android APK: app-release.apk

            ## Docker Image
            ```
            docker run -p 50051:50051 -ti ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```
          files: |
            bin/hydris-*
            bin/app-release.apk
          draft: false
          prerelease: false
