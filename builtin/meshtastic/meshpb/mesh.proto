// reverse engineered meshtastic serial wire protocol from a t-echo
// this seems to work just fine, but only tested what we need
//go:generate protoc --go_out=. --go_opt=paths=source_relative mesh.proto
syntax = "proto3";
package meshpb;
option go_package = "github.com/projectqai/hydris/builtin/meshtastic/meshpb";

enum Port {
  PORT_UNKNOWN       = 0;
  PORT_TEXT          = 1;
  PORT_POSITION      = 3;
  PORT_NODEINFO      = 4;
  PORT_ADMIN         = 6;
  PORT_TELEMETRY     = 67;
  PORT_TAK           = 72;
  PORT_TAK_FORWARDER = 257;
  PORT_HYDRIS        = 78;
}

message Payload {
  Port  port    = 1;
  bytes data    = 2;
}

message Packet {
  fixed32 src     = 1;
  fixed32 dst     = 2;
  uint32  ch      = 3;
  oneof body {
    Payload decoded   = 4;
    bytes   encrypted = 5;
  }
  fixed32 id        = 6;
  fixed32 rx_time   = 7;
  float   rx_snr    = 8;
  uint32  hop_limit = 9;
  bool    want_ack  = 10;
  int32   rx_rssi   = 12;
  uint32  hop_start = 15;
}

message ToRadio {
  oneof msg {
    Packet packet         = 1;
    uint32 want_config_id = 3;
  }
}

message FromRadio {
  uint32 id = 1;
  oneof msg {
    Packet       packet             = 2;
    NodeSelf     self               = 3;
    NodeEntry    node               = 4;
    RadioConfig  config             = 5;
    Log          log                = 6;
    uint32       config_complete_id = 7;
    ModConfig    mod_config         = 9;
    Chan         channel            = 10;
    TxQueue      queue              = 11;
  }
}

message NodeSelf {
  uint32 node_num = 1;
}

message Peer {
  string id         = 1;
  string long_name  = 2;
  string short_name = 3;
  bytes  mac        = 4;
  uint32 hw         = 5;
  uint32 role       = 7;
}

message Pos {
  sfixed32 lat_i      = 1;
  sfixed32 lon_i      = 2;
  int32    alt        = 3;
  fixed32  time       = 4;
  uint32   sats       = 19;
}

message NodeEntry {
  uint32 num        = 1;
  Peer   peer       = 2;
  Pos    position   = 3;
  float  snr        = 4;
  fixed32 last_heard = 5;
}

message Log {
  string message = 1;
  uint32 level   = 4;
}

message TxQueue {
  int32  res    = 1;
  uint32 free   = 2;
  uint32 maxlen = 3;
}

message Chan {
  int32  index    = 1;
  bytes  settings = 2;
  uint32 role     = 3;
}

message RadioConfig {
  oneof section {
    bytes device    = 1;
    bytes position  = 2;
    bytes power     = 3;
    bytes network   = 4;
    bytes display   = 5;
    bytes lora      = 6;
    bytes bluetooth = 7;
    bytes security  = 8;
  }
}

message ModConfig {
  oneof section {
    bytes mqtt          = 1;
    bytes serial        = 2;
    bytes ext_notify    = 3;
    bytes store_fwd     = 4;
    bytes range_test    = 5;
    bytes telemetry     = 6;
    bytes canned_msg    = 7;
    bytes audio         = 8;
    bytes remote_hw     = 9;
    bytes neighbor_info = 10;
    bytes ambient_light = 11;
    bytes detect_sensor = 12;
    bytes paxcounter    = 13;
  }
}

// TAK application layer

message TAKContact {
  string callsign        = 1;
  string device_callsign = 2;
}

message TAKGroup {
  uint32 role = 1;
  uint32 team = 2;
}

message TAKStatus {
  uint32 battery = 1;
}

message TAKPLI {
  sfixed32 lat_i = 1;
  sfixed32 lon_i = 2;
  int32    alt   = 3;
  uint32   speed = 4;
  uint32   course = 5;
}

message TAKChat {
  string message = 1;
  string to      = 2;
}

message TAKPacket {
  bool       compressed = 1;
  TAKContact contact    = 2;
  TAKGroup   group      = 3;
  TAKStatus  status     = 4;
  oneof body {
    TAKPLI  pli  = 5;
    TAKChat chat = 6;
  }
}

// Telemetry

message DevMetrics {
  uint32 battery_level = 1;
  float  voltage       = 2;
  float  ch_util       = 3;
  float  air_util_tx   = 4;
  uint32 uptime        = 5;
}

message Telem {
  fixed32 time = 1;
  oneof reading {
    DevMetrics device = 2;
  }
}

// --- Admin protocol for configuring radio hardware ---
// Field numbers match the upstream meshtastic wire format.

enum RegionCode {
  REGION_UNSET  = 0;
  REGION_US     = 1;
  REGION_EU_433 = 2;
  REGION_EU_868 = 3;
  REGION_CN     = 4;
  REGION_JP     = 5;
  REGION_ANZ    = 6;
  REGION_KR     = 7;
  REGION_TW     = 8;
  REGION_RU     = 9;
  REGION_IN     = 10;
  REGION_NZ_865 = 11;
  REGION_TH     = 12;
  REGION_LORA_24 = 13;
  REGION_UA_433 = 14;
  REGION_UA_868 = 15;
  REGION_MY_433 = 16;
  REGION_MY_919 = 17;
  REGION_SG_923 = 18;
  REGION_PH_433 = 19;
  REGION_PH_868 = 20;
  REGION_PH_915 = 21;
}

enum ModemPreset {
  MODEM_LONG_FAST     = 0;
  MODEM_MEDIUM_SLOW   = 3;
  MODEM_MEDIUM_FAST   = 4;
  MODEM_SHORT_SLOW    = 5;
  MODEM_SHORT_FAST    = 6;
  MODEM_LONG_MODERATE = 7;
  MODEM_SHORT_TURBO   = 8;
  MODEM_LONG_TURBO    = 9;
}

enum DeviceRole {
  ROLE_CLIENT        = 0;
  ROLE_CLIENT_MUTE   = 1;
  ROLE_ROUTER        = 2;
  ROLE_TRACKER       = 5;
  ROLE_SENSOR        = 6;
  ROLE_TAK           = 7;
  ROLE_CLIENT_HIDDEN = 8;
  ROLE_TAK_TRACKER   = 10;
  ROLE_ROUTER_LATE   = 11;
}

enum RebroadcastMode {
  REBROADCAST_ALL        = 0;
  REBROADCAST_LOCAL_ONLY = 2;
  REBROADCAST_KNOWN_ONLY = 3;
  REBROADCAST_NONE       = 4;
}

enum GpsMode {
  GPS_DISABLED    = 0;
  GPS_ENABLED     = 1;
  GPS_NOT_PRESENT = 2;
}

enum ChannelRole {
  CH_DISABLED  = 0;
  CH_PRIMARY   = 1;
  CH_SECONDARY = 2;
}

// LoRa radio parameters. Field numbers match upstream Config.LoRaConfig.
message LoraConfig {
  bool        use_preset    = 1;
  ModemPreset modem_preset  = 2;
  uint32      bandwidth     = 3;
  uint32      spread_factor = 4;
  uint32      coding_rate   = 5;
  float       frequency_offset = 6;
  RegionCode  region        = 7;
  uint32      hop_limit     = 8;
  bool        tx_enabled    = 9;
  int32       tx_power      = 10;
  uint32      channel_num   = 11;
  bool        override_duty_cycle    = 12;
  bool        sx126x_rx_boosted_gain = 13;
  float       override_frequency     = 14;
  bool        ignore_mqtt   = 104;
  bool        config_ok_to_mqtt = 105;
}

// Device behaviour. Field numbers match upstream Config.DeviceConfig.
message DeviceConfig {
  DeviceRole      role                     = 1;
  RebroadcastMode rebroadcast_mode         = 6;
  uint32          node_info_broadcast_secs = 7;
}

// Position reporting. Field numbers match upstream Config.PositionConfig.
message PositionConfig {
  uint32  position_broadcast_secs          = 1;
  bool    position_broadcast_smart_enabled = 2;
  bool    fixed_position                   = 3;
  uint32  gps_update_interval              = 5;
  uint32  broadcast_smart_minimum_distance = 10;
  uint32  broadcast_smart_minimum_interval_secs = 11;
  GpsMode gps_mode                         = 13;
}

// Wrapper matching upstream Config oneof. Only sections we care about.
message CfgSet {
  oneof payload_variant {
    DeviceConfig   device   = 1;
    PositionConfig position = 2;
    LoraConfig     lora     = 6;
  }
}

// Channel encryption and identity. Field numbers match upstream ChannelSettings.
message ChanSettings {
  bytes  psk  = 2;
  string name = 3;
}

// Channel with index and role. Field numbers match upstream Channel.
message ChanCfg {
  int32        index    = 1;
  ChanSettings settings = 2;
  ChannelRole  role     = 3;
}

// User/owner identity. Field numbers match upstream User.
message Owner {
  string id         = 1;
  string long_name  = 2;
  string short_name = 3;
}

// Admin message sent to PORT_ADMIN on the device's own node.
// Field numbers match upstream AdminMessage payload_variant.
message AdminMsg {
  oneof payload_variant {
    Owner  set_owner   = 32;
    ChanCfg set_channel = 33;
    CfgSet set_config  = 34;
    bool   begin_edit_settings  = 64;
    bool   commit_edit_settings = 65;
  }
}
